<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kitchen Wars: The Door</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="title-bar" aria-label="Game title">
        <p class="project-code">PRIMUS</p>
        <h1>Kitchen Wars: The Door</h1>
      </header>

      <section class="game-frame" aria-label="Kitchen Wars: The Door static prototype">
        <canvas id="gameCanvas" width="960" height="540">
          Kitchen Wars: The Door requires a browser that supports Canvas.
        </canvas>
        <button id="startButton" class="start-button" type="button" data-track="game_open" data-track-label="Kitchen Wars: The Door start button">Start</button>
      </section>

      <p class="control-hint">Move: A/D or Left/Right. Jump: W or Up. Duck: S or Down. Shoot: Space. Restart: Enter.</p>
    </main>

    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/site-analytics.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
